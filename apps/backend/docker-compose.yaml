version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portfel_db
    environment:
      POSTGRES_USER: portfel_user
      POSTGRES_PASSWORD: portfel_password
      POSTGRES_DB: portfel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: