name: BE - Portfel+

on:
  push:
    branches: [ "**" ]
    paths:
      - 'apps/backend/**'
  pull_request:
    paths:
      - 'apps/backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src

  type_check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Mypy and dependencies
        run: |
          pip install mypy
          pip install -r requirements.txt 

      - name: Run Mypy
        run: mypy src --config-file mypy.ini

  build_and_push:
    needs: [lint, type_check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/portfel-backend

      - name: Sprawdzenie struktury katalogów na serwerze (DEBUG)
        run: |
          echo "=== Zawartość głównego katalogu repozytorium ==="
          ls -la
          echo "=== Zawartość folderu apps (jeśli istnieje) ==="
          ls -la apps/ || echo "UWAGA: Folder 'apps' w ogóle tutaj nie istnieje!"

      - name: Build and (conditionally) push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}